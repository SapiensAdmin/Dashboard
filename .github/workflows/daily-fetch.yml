name: Daily NAV Fetch

on:
  schedule:
    - cron: '30 23 * * 1-5'   # 5:00 AM IST (23:30 UTC prev night), Mon-Fri
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest NAVs
        run: python scripts/fetch_navs.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json data/history.json data/navs.csv dist/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily NAV update $(date -u '+%Y-%m-%d')"
          git push origin main
