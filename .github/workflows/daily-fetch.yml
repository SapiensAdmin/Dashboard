name: Daily NAV Fetch

on:
  schedule:
    - cron: '30 15 * * 1-5'   # 9:00 PM IST (15:30 UTC), Mon-Fri
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest NAVs
        run: python scripts/fetch_navs.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Commit updated data and build
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily NAV update"
          file_pattern: 'data/*.json dist/**'
          branch: main
