name: Monthly Trailing-3Y Snapshot

on:
  schedule:
    - cron: '0 4 1 * *'   # 09:30 IST on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Ensure portfolio data is fresh
        run: python scripts/fetch_navs.py

      - name: Compute trailing-3Y snapshot for previous month
        run: python scripts/monthly_snapshot.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/monthly_snapshots.json data/portfolio.json data/history.json data/navs.csv data/bse500_index.csv
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: monthly trailing-3Y snapshot $(date -u '+%Y-%m')"
          git push origin main
